name: Deploy Landing

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Ensure remote dir
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_TARGET_DIR: ${{ secrets.SSH_TARGET_DIR }}
        run: |
          set -e
          ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p '$SSH_TARGET_DIR'"

      - name: Upload landing files
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_TARGET_DIR: ${{ secrets.SSH_TARGET_DIR }}
        run: |
          set -e
          rsync -az --delete \
            -e "ssh -p ${SSH_PORT:-22}" \
            --include="index.html" \
            --include="style.css" \
            --include="script.js" \
            --include="image_copy-bg.png" \
            --include="printsistema.png" \
            --exclude="*" \
            ./ "$SSH_USER@$SSH_HOST:$SSH_TARGET_DIR/"

      - name: Post deploy command
        if: ${{ secrets.POST_DEPLOY_CMD != '' }}
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          POST_DEPLOY_CMD: ${{ secrets.POST_DEPLOY_CMD }}
        run: |
          set -e
          ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "$POST_DEPLOY_CMD"
