name: Deploy Landing

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.precheck.outputs.ready }}
      auth_mode: ${{ steps.precheck.outputs.auth_mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        id: precheck
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_TARGET_DIR: ${{ secrets.SSH_TARGET_DIR }}
        run: |
          if [ -n "$SSH_HOST" ] && [ -n "$SSH_USER" ] && [ -n "$SSH_TARGET_DIR" ] && [ -n "$SSH_PRIVATE_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "auth_mode=key" >> "$GITHUB_OUTPUT"
          elif [ -n "$SSH_HOST" ] && [ -n "$SSH_USER" ] && [ -n "$SSH_TARGET_DIR" ] && [ -n "$SSH_PASSWORD" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "auth_mode=password" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "auth_mode=none" >> "$GITHUB_OUTPUT"
            echo "Missing SSH secrets. Provide SSH_HOST, SSH_USER, SSH_TARGET_DIR and either SSH_PRIVATE_KEY or SSH_PASSWORD."
          fi

      - name: Configure SSH key
        if: steps.precheck.outputs.ready == 'true' && steps.precheck.outputs.auth_mode == 'key'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Install sshpass (password mode)
        if: steps.precheck.outputs.ready == 'true' && steps.precheck.outputs.auth_mode == 'password'
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Ensure remote dir
        if: steps.precheck.outputs.ready == 'true'
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_TARGET_DIR: ${{ secrets.SSH_TARGET_DIR }}
          AUTH_MODE: ${{ steps.precheck.outputs.auth_mode }}
        run: |
          set -e
          if [ "$AUTH_MODE" = "key" ]; then
            SSH_BASE="ssh -o BatchMode=yes -o IdentitiesOnly=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa -p ${SSH_PORT:-22}"
          else
            SSH_BASE="sshpass -p \"$SSH_PASSWORD\" ssh -o ConnectTimeout=20 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p ${SSH_PORT:-22}"
          fi
          eval "$SSH_BASE \"$SSH_USER@$SSH_HOST\" \"mkdir -p '$SSH_TARGET_DIR'\""

      - name: Upload landing files
        if: steps.precheck.outputs.ready == 'true'
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_TARGET_DIR: ${{ secrets.SSH_TARGET_DIR }}
          AUTH_MODE: ${{ steps.precheck.outputs.auth_mode }}
        run: |
          set -e
          if [ "$AUTH_MODE" = "key" ]; then
            RSYNC_RSH="ssh -o BatchMode=yes -o IdentitiesOnly=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa -p ${SSH_PORT:-22}"
            RSYNC_PREFIX=""
          else
            RSYNC_RSH="ssh -o ConnectTimeout=20 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p ${SSH_PORT:-22}"
            RSYNC_PREFIX="sshpass -p \"$SSH_PASSWORD\""
          fi

          eval "$RSYNC_PREFIX rsync -az --delete \
            -e \"$RSYNC_RSH\" \
            --exclude \".git/\" \
            --exclude \".github/\" \
            --exclude \"node_modules/\" \
            --exclude \"*.md\" \
            ./ \"$SSH_USER@$SSH_HOST:$SSH_TARGET_DIR/\""

      - name: Deploy docker stack
        if: steps.precheck.outputs.ready == 'true'
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_TARGET_DIR: ${{ secrets.SSH_TARGET_DIR }}
          AUTH_MODE: ${{ steps.precheck.outputs.auth_mode }}
        run: |
          set -e
          if [ "$AUTH_MODE" = "key" ]; then
            SSH_BASE="ssh -o BatchMode=yes -o IdentitiesOnly=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa -p ${SSH_PORT:-22}"
          else
            SSH_BASE="sshpass -p \"$SSH_PASSWORD\" ssh -o ConnectTimeout=20 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p ${SSH_PORT:-22}"
          fi
          eval "$SSH_BASE \"$SSH_USER@$SSH_HOST\" \"cd '$SSH_TARGET_DIR' && GC_SOLAR_APP_DIR='$SSH_TARGET_DIR' SWARM_NODE_HOSTNAME=\\$(hostname) docker stack deploy -c '$SSH_TARGET_DIR/docker-compose.yml' gcsolar-app\""
          eval "$SSH_BASE \"$SSH_USER@$SSH_HOST\" \"docker service update --force gcsolar-app_landing || true\""
          eval "$SSH_BASE \"$SSH_USER@$SSH_HOST\" \"docker service update --force gcsolar-app_backend || true\""
