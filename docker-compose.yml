services:
  backend:
    image: node:20-alpine
    working_dir: /app/backend
    command: sh -c "npm ci --omit=dev && node server/index.js"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - PUBLIC_BASE_URL=https://app.gc.solar
    volumes:
      - type: bind
        source: ${GC_SOLAR_APP_DIR:-/root/gcsolar-app}
        target: /app
    networks:
      - Admin
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - "node.hostname == ${SWARM_NODE_HOSTNAME}"

  landing:
    image: nginx:1.27-alpine
    volumes:
      - type: bind
        source: ${GC_SOLAR_APP_DIR:-/root/gcsolar-app}
        target: /usr/share/nginx/html
        read_only: true
      - type: bind
        source: ${GC_SOLAR_APP_DIR:-/root/gcsolar-app}/nginx/default.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    networks:
      - Admin
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - "node.hostname == ${SWARM_NODE_HOSTNAME}"
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=Admin"
        - "traefik.http.routers.gcsolar-app.rule=Host(`app.gc.solar`)"
        - "traefik.http.routers.gcsolar-app.entrypoints=websecure"
        - "traefik.http.routers.gcsolar-app.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.gcsolar-app.loadbalancer.server.port=80"

networks:
  Admin:
    external: true
