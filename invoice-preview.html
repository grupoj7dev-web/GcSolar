<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualizar Fatura</title>
  <link rel="icon" type="image/png" href="gc_icon_final.png">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f4f6f5; font-family: Inter, Arial, sans-serif; }
    .topbar { height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; border-bottom: 1px solid #d6ddd9; background: #fff; }
    .title { font-size: 14px; font-weight: 700; color: #1b4332; }
    .actions { display: flex; gap: 8px; }
    .btn { border: 1px solid #cfd7d3; background: #fff; color: #1f2937; border-radius: 8px; padding: 8px 10px; font-size: 12px; cursor: pointer; }
    .btn:hover { background: #f7faf8; }
    .stage { height: calc(100% - 53px); }
    .frame { width: 100%; height: 100%; border: 0; background: #fff; }
    .empty { padding: 32px; color: #475569; }
  </style>
</head>
<body>
  <header class="topbar">
    <strong class="title" id="titleText">Fatura</strong>
    <div class="actions">
      <button class="btn" id="openOriginalBtn" type="button">Abrir original</button>
      <button class="btn" id="closeBtn" type="button">Fechar</button>
    </div>
  </header>
  <main class="stage" id="stage"></main>
  <script src="invoice-preview.js?v=20260312-preview1"></script>
</body>
</html>
