<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualizar Fatura</title>
  <link rel="icon" type="image/png" href="gc_icon_final.png">
  <style>
    :root {
      --gc-bg: #eef2ef;
      --gc-surface: #ffffff;
      --gc-border: #d5ddd8;
      --gc-brand: #0f6b3f;
      --gc-brand-soft: #e8f5ee;
      --gc-text: #173329;
      --gc-muted: #425a50;
      --gc-danger: #b42318;
    }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--gc-bg); font-family: Inter, Arial, sans-serif; color: var(--gc-text); }
    .topbar { height: 54px; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; border-bottom: 1px solid var(--gc-border); background: linear-gradient(180deg, var(--gc-surface), #f7faf8); }
    .title { font-size: 14px; font-weight: 700; color: var(--gc-brand); }
    .actions { display: flex; gap: 8px; }
    .btn { border: 1px solid var(--gc-border); background: var(--gc-surface); color: var(--gc-text); border-radius: 8px; padding: 8px 10px; font-size: 12px; cursor: pointer; font-weight: 600; }
    .btn:hover { background: #f7faf8; }
    #closeBtn { border-color: #ebd2d1; color: var(--gc-danger); }
    .stage { height: calc(100% - 54px); }
    .frame { width: 100%; height: 100%; border: 0; background: var(--gc-surface); }
    .empty { margin: 24px; padding: 18px; border: 1px solid var(--gc-border); border-radius: 12px; background: var(--gc-surface); color: var(--gc-muted); }
  </style>
</head>
<body>
  <header class="topbar">
    <strong class="title" id="titleText">Fatura</strong>
    <div class="actions">
      <button class="btn" id="closeBtn" type="button">Fechar</button>
    </div>
  </header>
  <main class="stage" id="stage"></main>
  <script src="invoice-preview.js?v=20260312-preview4"></script>
</body>
</html>
